server {
    server_name smartsht.com www.smartsht.com;

    root /var/www/smartsht;
    index index.html;

    # ─── Security Headers ───
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;

    # ─── Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── API proxy — routes to Express server ───
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding off;
    }

    # ─── Health check ───
    location /health {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Legal pages ───
    location = /terms {
        alias /var/www/smartsht/terms.html;
    }

    location = /privacy {
        alias /var/www/smartsht/privacy.html;
    }

    # ─── Shared workbook links (/shared/:token) — serve SPA ───
    location /shared/ {
        rewrite ^ /app/index.html last;
    }

    # ─── App (built SPA) ───
    location /app/ {
        alias /var/www/smartsht/app/;
        index index.html;
        try_files $uri $uri/ /app/index.html;
    }

    # ─── Landing page ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Static asset caching ───
    # Note: security headers are repeated here because nginx drops parent
    # add_header directives when a child block defines its own.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    # ─── Block dotfiles ───
    location ~ /\. { deny all; }

    # ─── SSL (Let's Encrypt) ───
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/smartsht.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartsht.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ─── HTTP → HTTPS redirect ───
server {
    listen 80;
    server_name smartsht.com www.smartsht.com;
    return 301 https://$host$request_uri;
}
